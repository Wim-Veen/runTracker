name: Build, Test and Package Docker Image

on: 
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup node.js
              uses: actions/setup-node@v4
              with:
                node-version: 'lts/*'
                cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests
              run: npm run test:coverage

            - name: Build app
              run: npm run build

    containerize:
        needs: build-and-test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Docker buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker image
              uses: docker/build-push-action@v5
              with:
                context: .
                file: ./Containerfile
                tags: runtracker:${{ github.sha }}
                outputs: type=docker,dest=/tmp/runtracker-image.tar
            
            - name: Upload image as artifact
              uses: actions/upload-artifact@v4
              with:
                name: runtracker-demo-image
                path: /tmp/runtracker-image.tar
                retention-days: 7
